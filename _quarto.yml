project:
  type: website
  output-dir: docs

website:
  description: "A blog built with Quarto"
  site-url: https://your-website-url.example.com # you must change this appropriately for RSS feeds to work properly
  title: "Darren Shoemaker"
  navbar:
    right:
      - about.qmd
      - icon: github
        href: https://github.com/thedungeonecologist
      - icon: linkedin
        href: https://www.linkedin.com/in/darrenshoemaker/
format:
  html:
    theme:
      - cosmo
      - brand
    css: styles.css

editor: visual

listing:
  id: posts
  contents: posts
  type: default
  fields: [image, date, title, reading-time, word-count, categories]
  sort: "date desc"